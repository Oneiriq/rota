name: docs

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install mdbook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: build book
        run: mdbook build book
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run so a clean clone of this
          # repo gets a working docs site without manual repo-settings
          # clicks. Was the silent failure on PRs #31, #32, #34 before
          # Pages was POSTed to /repos/{owner}/{repo}/pages by hand.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
